# Benchmark the fused grouped-topk Pallas kernel vs the original sort-based JAX routing
# on a single TPU v6e chip. The TPU clones the repo at $REF (public, no auth needed),
# so launching is fast — no large local upload.
#
#   sky launch -c gtopk-bench scripts/bench_grouped_topk.sky.yaml --down -y
#
# Override the branch / swept token sizes / routing configs at launch time:
#
#   sky launch -c gtopk-bench scripts/bench_grouped_topk.sky.yaml --down -y \
#       --env REF=my-branch \
#       --env T=256,512,1024,4096 \
#       --env CONFIGS=dsv3:256/8/4/8
#
# The result table is streamed to the job log and also saved on the cluster at
# ~/sglang-jax/grouped_topk_bench.log . Fetch it with:
#
#   sky logs gtopk-bench --status            # job exit status
#   rsync -Pa $(sky status --ip gtopk-bench):~/sglang-jax/grouped_topk_bench.log .
name: grouped-topk-bench

resources:
  accelerators: tpu-v6e-1
  accelerator_args:
    runtime_version: v2-alpha-tpuv6e
  use_spot: true  # spot by default; pass `--no-use-spot` to sky launch for on-demand

envs:
  REPO: https://github.com/primatrix/sglang-jax.git
  REF: bench/grouped-topk-tpu
  # Token counts (rows) to sweep. Comma-separated.
  T: "64,128,256,512,1024,2048,4096,8192,16384,32768"
  # Routing configs as name:E/G/Gtop/k. E=num_experts, G=num_expert_group,
  # Gtop=topk_group (groups kept), k=topk (final experts). Must satisfy
  # E % G == 0, E/G >= 2, Gtop <= G, and k <= Gtop * (E/G).
  # The default sweep varies Gtop in {2,4,6,8} and k in {4,8,16,32,64} to map how
  # the fused vs sort gap moves with routing breadth/depth, plus two E=512 points.
  # `dsv3` is the canonical DeepSeek-V3 shape; `gt2_k64` is the tightest valid
  # case (k == Gtop * E/G == 64).
  CONFIGS: "dsv3:256/8/4/8,gt2_k4:256/8/2/4,gt6_k8:256/8/6/8,gt8_k8:256/8/8/8,gt4_k16:256/8/4/16,gt4_k32:256/8/4/32,gt4_k64:256/8/4/64,gt2_k64:256/8/2/64,e512_gt4_k8:512/8/4/8,e512_gt6_k64:512/8/6/64"

setup: |
  set -e
  if [ -d sglang-jax ]; then rm -rf sglang-jax; fi
  git clone --branch "$REF" --single-branch "$REPO" sglang-jax
  cd sglang-jax
  uv venv --python 3.12 .venv
  source .venv/bin/activate
  # `tpu` extra pins jax[tpu]==0.8.1; editable install makes `sgl_jax` importable.
  uv pip install -e "python[tpu]"

run: |
  set -e
  cd sglang-jax
  source .venv/bin/activate
  echo "=== environment ==="
  python -c "import jax; print('jax', jax.__version__, '| devices', jax.devices())"
  echo "=== ref=$REF  sweep: T=$T  CONFIGS=$CONFIGS ==="
  python -m benchmark.kernels.grouped_topk.bench_grouped_topk \
    --T "$T" \
    --configs "$CONFIGS" \
    2>&1 | tee grouped_topk_bench.log
